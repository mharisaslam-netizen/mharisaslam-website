  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

data-site-nav] [data-nav-toggle]:checked ~ [data-nav-links] { display: flex !important; }\n    [style*=\"max-width:1180px\"] { padding-left: 20px !important; padding-right: 20px !important; }\n    [style*=\"grid-template-columns\"] { grid-template-columns: 1fr !important; }\n    [style*=\"font-size:64px\"] { font-size: 38px !important; }\n    [style*=\"font-size:34px\"] { font-size: 26px !important; }\n    [style*=\"padding:80px 48px\"] { padding: 48px 20px !important; }\n  }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"background:#fafaf7; color:#141414; font-family:'Archivo',sans-serif; -webkit-font-smoothing:antialiased;\">\n  <dc-import name=\"SiteNav\" current=\"ailab\" hint-size=\"100%,70px\"><\u002Fdc-import>\n\n  <header style=\"max-width:1180px; margin:0 auto; padding:80px 48px 44px;\">\n    <div style=\"font-family:'JetBrains Mono',monospace; font-size:12px; letter-spacing:0.2em; text-transform:uppercase; color:#2b56d8;\">AI Lab<\u002Fdiv>\n    <h1 style=\"font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:64px; line-height:1.02; letter-spacing:-0.04em; margin:16px 0 20px; max-width:900px;\">I don't just talk about AI. I build with it.<\u002Fh1>\n    <p style=\"font-size:19px; line-height:1.6; color:#4a4a46; max-width:680px; margin:0;\">Two decades running commerce taught me where the real work is. Now I build AI products and workflows that do that work — grounded in real data, governed by real rules, and shipped, not slide-decked.<\u002Fp>\n  <\u002Fheader>\n\n  <section style=\"max-width:1180px; margin:0 auto; padding:0 48px 20px;\">\n    <div style=\"display:grid; grid-template-columns:repeat(4,1fr); gap:16px;\">\n      <div style=\"background:#fff; border:1px solid #ecece6; border-radius:14px; padding:24px;\"><div style=\"font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:15px; margin-bottom:6px;\">Agentic workflows<\u002Fdiv><div style=\"font-size:13.5px; line-height:1.6; color:#4a4a46;\">Coordinated AI agents with clear permissions and human-in-the-loop control.<\u002Fdiv><\u002Fdiv>\n      <div style=\"background:#fff; border:1px solid #ecece6; border-radius:14px; padding:24px;\"><div style=\"font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:15px; margin-bottom:6px;\">Grounded AI<\u002Fdiv><div style=\"font-size:13.5px; line-height:1.6; color:#4a4a46;\">Outputs tied to real numbers and data — not generic model chatter.<\u002Fdiv><\u002Fdiv>\n      <div style=\"background:#fff; border:1px solid #ecece6; border-radius:14px; padding:24px;\"><div style=\"font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:15px; margin-bottom:6px;\">Full-stack shipping<\u002Fdiv><div style=\"font-size:13.5px; line-height:1.6; color:#4a4a46;\">From product design to live, deployed apps with onboarding and auth.<\u002Fdiv><\u002Fdiv>\n      <div style=\"background:#fff; border:1px solid #ecece6; border-radius:14px; padding:24px;\"><div style=\"font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:15px; margin-bottom:6px;\">Operator's product sense<\u002Fdiv><div style=\"font-size:13.5px; line-height:1.6; color:#4a4a46;\">Built around real P&amp;L decisions, exceptions and trade-offs.<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section style=\"max-width:1180px; margin:0 auto; padding:44px 48px 96px;\">\n    <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:24px;\">\n\n      <a href=\"ai-commerce.dc.html\" style=\"display:block; color:#141414; border:1px solid #ecece6; border-radius:20px; background:#fff; overflow:hidden;\">\n        <div style=\"background:#0f1626;\">\n          <img src=\"c3e400ad-4916-48f7-ae0f-7f2f206986b0\" alt=\"AI Commerce Command Center\" style=\"display:block; width:100%; height:auto;\">\n        <\u002Fdiv>\n        <div style=\"padding:30px 32px;\">\n          <div style=\"display:flex; gap:8px; margin-bottom:14px;\"><span style=\"font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:0.1em; text-transform:uppercase; color:#8a6d00; background:#fbf3d5; padding:5px 11px; border-radius:100px;\">In development<\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:0.1em; text-transform:uppercase; color:#5a5a56; background:#f2f0ea; padding:5px 11px; border-radius:100px;\">Agentic · Commerce<\u002Fspan><\u002Fdiv>\n          <h2 style=\"font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:26px; letter-spacing:-0.02em; margin:0 0 10px;\">AI Commerce Command Center<\u002Fh2>\n          <p style=\"font-size:15px; line-height:1.65; color:#4a4a46; margin:0 0 16px;\">A full commerce operation — catalog, orders, care, sellers, inventory, pricing and finance — run on lean resources by coordinated AI agents under human approval.<\u002Fp>\n          <span style=\"font-family:'Space Grotesk',sans-serif; font-size:14px; font-weight:600; color:#2b56d8;\">Explore the system →<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fa>\n\n      <a href=\"career-runway.dc.html\" style=\"display:block; color:#141414; border:1px solid #ecece6; border-radius:20px; background:#fff; overflow:hidden;\">\n        <div style=\"width:100%; aspect-ratio:16/10; background:#0f1626; display:flex; align-items:center; justify-content:center; gap:22px; font-family:'Archivo',sans-serif;\">\n          <div style=\"width:104px; height:104px; border-radius:50%; background:conic-gradient(#6f8cf5 0% 82%, #21304b 82% 100%); display:flex; align-items:center; justify-content:center;\"><div style=\"width:78px; height:78px; border-radius:50%; background:#0f1626; display:flex; flex-direction:column; align-items:center; justify-content:center;\"><span style=\"font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:28px; color:#fff; line-height:1;\">82<\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace; font-size:8px; letter-spacing:0.12em; color:#8893a5; margin-top:2px;\">DNA SCORE<\u002Fspan><\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex; flex-direction:column; gap:10px;\">\n            <div style=\"font-family:'JetBrains Mono',monospace; font-size:9px; letter-spacing:0.1em; text-transform:uppercase; color:#0b1120; background:#6f8cf5; padding:4px 10px; border-radius:100px; font-weight:600; align-self:flex-start;\">Builder–Operator<\u002Fdiv>\n            <div style=\"display:flex; align-items:baseline; gap:8px;\"><span style=\"font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:22px; color:#4ade80;\">14 mo<\u002Fspan><span style=\"font-size:11px; color:#8893a5;\">runway<\u002Fspan><\u002Fdiv>\n            <div style=\"width:120px; height:7px; border-radius:100px; background:#21304b; overflow:hidden;\"><div style=\"width:60%; height:100%; background:linear-gradient(90deg,#22c55e,#4ade80);\"><\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"padding:30px 32px;\">\n          <div style=\"display:flex; gap:8px; margin-bottom:14px;\"><span style=\"font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:0.1em; text-transform:uppercase; color:#1a7a4a; background:#e6f4ec; padding:5px 11px; border-radius:100px;\">Live<\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:0.1em; text-transform:uppercase; color:#5a5a56; background:#f2f0ea; padding:5px 11px; border-radius:100px;\">Career · Fintech<\u002Fspan><\u002Fdiv>\n          <h2 style=\"font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:26px; letter-spacing:-0.02em; margin:0 0 10px;\">Career Runway AI<\u002Fh2>\n          <p style=\"font-size:15px; line-height:1.65; color:#4a4a46; margin:0 0 16px;\">Helps professionals stuck in corporate life read their Career DNA and their real financial runway — grounded in their own numbers — before they leap.<\u002Fp>\n          <span style=\"font-family:'Space Grotesk',sans-serif; font-size:14px; font-weight:600; color:#2b56d8;\">Explore the product →<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fa>\n\n    <\u002Fdiv>\n\n    <div style=\"display:flex; flex-wrap:wrap; gap:18px; align-items:center; justify-content:space-between; background:#141414; color:#fafaf7; border-radius:18px; padding:40px 44px; margin-top:24px;\">\n      <div>\n        <h2 style=\"font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:26px; letter-spacing:-0.02em; margin:0 0 6px;\">Building something AI-driven?<\u002Fh2>\n        <p style=\"font-size:15.5px; line-height:1.6; color:#b9c0cc; margin:0;\">I partner with founders and teams to design and ship AI products and workflows.<\u002Fp>\n      <\u002Fdiv>\n      <a href=\"contact.dc.html\" style=\"font-family:'Space Grotesk',sans-serif; font-size:15px; font-weight:600; background:#2b56d8; color:#fff; padding:16px 30px; border-radius:10px; white-space:nowrap;\">Let's build →<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <dc-import name=\"SiteFooter\" hint-size=\"100%,420px\"><\u002Fdc-import>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1180}}\"><\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
